---
- name: Konfigurasi SNMP pada Switch
  hosts: all
  gather_facts: no
  connection: network_cli

  tasks:
    - name: Masuk ke mode config dan set SNMP
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop:
        - "configure terminal"
        - "snmp-server community rahasiaKomunitas ro"
        - "snmp-server enable traps"
        - "end"
        - "write"
